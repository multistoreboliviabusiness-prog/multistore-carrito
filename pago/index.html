<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Pago MultiStore</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      margin: 0;
      background: url('../fondo.png') no-repeat center center fixed;
      background-size: cover;
      color: #222;
    }

    .container {
      max-width: 760px;
      margin: 0 auto;
      padding: 24px;
    }

    .card {
      background: rgba(255, 255, 255, 0.92);
      border-radius: 16px;
      padding: 20px;
      box-shadow: 0 4px 18px rgba(0, 0, 0, 0.08);
      margin-bottom: 20px;
    }

    h1 {
      margin-top: 0;
      font-size: 32px;
    }

    h2 {
      margin-top: 0;
      font-size: 22px;
    }

    .row {
      display: flex;
      justify-content: space-between;
      gap: 12px;
      padding: 14px 0;
      border-bottom: 1px solid #eee;
    }

    .row:last-child {
      border-bottom: none;
    }

    .product-name {
      font-weight: bold;
      margin-bottom: 6px;
    }

    .muted {
      color: #666;
      line-height: 1.5;
    }

    .subtotal {
      font-weight: bold;
      white-space: nowrap;
      align-self: center;
    }

    .totals-line {
      display: flex;
      justify-content: space-between;
      gap: 12px;
      padding: 10px 0;
      font-size: 18px;
      border-bottom: 1px solid #eee;
    }

    .totals-line:last-child {
      border-bottom: none;
    }

    .grand-total {
      font-size: 28px;
      font-weight: bold;
      color: #0a7a28;
    }

    .qr-box {
      text-align: center;
    }

    .qr-message {
      font-size: 22px;
      font-weight: bold;
      line-height: 1.4;
      margin-bottom: 18px;
    }

    .qr-image {
      max-width: 320px;
      width: 100%;
      border-radius: 12px;
      margin: 0 auto 18px;
      display: block;
    }

    .btn {
      display: inline-block;
      width: 100%;
      text-align: center;
      background: #27d338;
      color: white;
      text-decoration: none;
      padding: 14px 18px;
      border-radius: 12px;
      font-weight: bold;
      box-sizing: border-box;
      border: none;
      cursor: pointer;
      font-size: 18px;
    }

    .detail-box {
      margin-top: 8px;
      padding: 10px 12px;
      background: rgba(0, 0, 0, 0.03);
      border-radius: 10px;
    }

    .detail-line {
      margin: 4px 0;
      color: #444;
    }

    .warning-box {
      text-align: center;
    }
  </style>
</head>
<body>
  <div class="container" id="contenidoPago">
    <div class="card">
      <h1>Resumen final de tu pedido</h1>
      <p class="muted">Revisa tus productos y el monto total antes de realizar el pago.</p>
    </div>

    <div class="card">
      <h2>Productos</h2>
      <div id="productos"></div>
    </div>

    <div class="card">
      <h2>Resumen de pago</h2>
      <div id="lineasTotales"></div>
    </div>

    <div class="card qr-box">
      <div class="qr-message">
        Porfavor haga su pago y presione el botón que dice:<br>
        Esperar confirmación de pago
      </div>

      <img class="qr-image" src="../qr.jpg" alt="QR de pago">

      <a class="btn" id="botonGracias" href="#">
        Esperar confirmación de pago
      </a>
    </div>
  </div>

  <script>
    window.name = 'multistore_resumen';

    const carritoActual = JSON.parse(localStorage.getItem('multistore_carrito') || '[]');

    if (!carritoActual || carritoActual.length === 0) {
      document.getElementById('contenidoPago').innerHTML = `
        <div class="card warning-box">
          <h1>Esta compra ya fue finalizada</h1>
          <p class="muted">Tu carrito está vacío. Vuelve a la tienda para iniciar una nueva compra.</p>
          <button class="btn" id="volverTiendaPagoBtn" type="button">Volver a la tienda</button>
        </div>
      `;

      document.getElementById('volverTiendaPagoBtn').addEventListener('click', () => {
        window.open('https://www.multistorebolivia.com', 'multistore_tienda');
      });
    } else {
      const params = new URLSearchParams(window.location.search);

      const itemsParam = params.get('items') || '';
      const totalPedido = Number(params.get('total_pedido')) || 0;
      const ciudad = decodeURIComponent(params.get('ciudad') || 'Por definir');

      const telefonoTabletOtros = decodeURIComponent(params.get('telefono_tablet_otros') || '');
      const modeloHidrogel = decodeURIComponent(params.get('modelo_hidrogel') || '');
      const cantidadHidrogel = Number(params.get('cantidad_hidrogel')) || 0;

      const productosDiv = document.getElementById('productos');
      const lineasTotalesDiv = document.getElementById('lineasTotales');

      let htmlProductos = '';
      let totalProductos = 0;
      let cantidadItemsEnvio = 0;

      if (itemsParam) {
        const items = itemsParam.split('|');

        items.forEach(item => {
          const [producto, precio, cantidad] = item.split(',');
          const productoNombre = decodeURIComponent(producto);
          const precioNum = Number(precio) || 0;
          let cantidadNum = Number(cantidad) || 1;
          let subtotal = precioNum * cantidadNum;
          let detalleExtra = '';

          if (productoNombre === 'Protector Hidrogel' && cantidadHidrogel > 0) {
            cantidadNum = cantidadHidrogel;
            subtotal = precioNum * cantidadNum;

            detalleExtra = `
              <div class="detail-box">
                <div class="detail-line"><strong>Tipo de equipo:</strong> ${telefonoTabletOtros || 'No especificado'}</div>
                <div class="detail-line"><strong>Marca y modelo:</strong> ${modeloHidrogel || 'No especificado'}</div>
              </div>
            `;

            cantidadItemsEnvio += Math.ceil(cantidadNum / 5);
          } else {
            cantidadItemsEnvio += cantidadNum;
          }

          totalProductos += subtotal;

          htmlProductos += `
            <div class="row">
              <div>
                <div class="product-name">${productoNombre}</div>
                <div class="muted">Precio unitario: ${precioNum} Bs</div>
                <div class="muted">Cantidad: ${cantidadNum}</div>
                <div class="muted">Subtotal: ${subtotal} Bs</div>
                ${detalleExtra}
              </div>
              <div class="subtotal">${subtotal} Bs</div>
            </div>
          `;
        });
      } else {
        htmlProductos = `<p class="muted">No hay productos en el pedido.</p>`;
      }

      productosDiv.innerHTML = htmlProductos;

      const bloquesEnvio = Math.ceil(cantidadItemsEnvio / 3);

      let costoBaseEnvio = 0;
      if (ciudad === 'Cochabamba') costoBaseEnvio = 15;
      else if (ciudad === 'Santa Cruz hasta 4to anillo') costoBaseEnvio = 0;
      else if (ciudad === 'Santa Cruz pasando 4to anillo hasta 8vo') costoBaseEnvio = 15;
      else if (ciudad === 'La Paz') costoBaseEnvio = 15;
      else if (ciudad === 'Tarija') costoBaseEnvio = 20;
      else if (ciudad === 'Sucre') costoBaseEnvio = 20;
      else if (ciudad === 'El Alto') costoBaseEnvio = 20;

      const costoEnvio = costoBaseEnvio * bloquesEnvio;
      const totalFinal = totalProductos + costoEnvio;

      lineasTotalesDiv.innerHTML = `
        <div class="totals-line">
          <span>Subtotal productos</span>
          <strong>${totalProductos} Bs</strong>
        </div>
        <div class="totals-line">
          <span>Ciudad de envío</span>
          <strong>${ciudad}</strong>
        </div>
        <div class="totals-line">
          <span>Costo de envío</span>
          <strong>${costoEnvio} Bs</strong>
        </div>
        <div class="totals-line grand-total">
          <span>Total final</span>
          <span>${totalFinal} Bs</span>
        </div>
      `;

      document.getElementById('botonGracias').href = 'https://multistore-carrito.vercel.app/finalizar';
    }
  </script>
</body>
</html>
