<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta http-equiv="refresh" content="2;url=https://sites.google.com/view/pagomultistore/gracias">
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Finalizando compra</title>
  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: url('../fondo.png') no-repeat center center fixed;
      background-size: cover;
      color: #222;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
    }

    .box {
      background: rgba(255,255,255,0.94);
      padding: 28px;
      border-radius: 18px;
      max-width: 520px;
      text-align: center;
      box-shadow: 0 6px 24px rgba(0,0,0,0.10);
    }

    h1 {
      margin-top: 0;
      font-size: 30px;
    }

    p {
      font-size: 18px;
      color: #555;
      line-height: 1.5;
      margin-bottom: 0;
    }
  </style>
</head>
<body>
  <div class="box">
    <h1>Finalizando tu compra...</h1>
    <p>Estamos limpiando tu carrito y redirigiéndote a la página final.</p>
  </div>

  <script>
    window.name = 'multistore_resumen';

    localStorage.removeItem('multistore_carrito');

    setTimeout(() => {
      window.location.href = 'https://sites.google.com/view/pagomultistore/gracias';
    }, 1500);
  </script>
</body>
</html>
