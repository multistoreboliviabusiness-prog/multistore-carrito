<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>MultiStore Carrito</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      margin: 0;
      background: url('fondo.png') no-repeat center center fixed;
      background-size: cover;
      color: #222;
    }

    .container {
      max-width: 680px;
      margin: 0 auto;
      padding: 24px;
    }

    .card {
      background: rgba(255, 255, 255, 0.92);
      border-radius: 16px;
      padding: 20px;
      box-shadow: 0 4px 18px rgba(0, 0, 0, 0.08);
      margin-bottom: 20px;
    }

    h1 {
      margin-top: 0;
      font-size: 32px;
    }

    h2 {
      margin-top: 0;
      font-size: 22px;
    }

    .row {
      display: flex;
      justify-content: space-between;
      gap: 12px;
      padding: 10px 0;
      border-bottom: 1px solid #eee;
    }

    .row:last-child {
      border-bottom: none;
    }

    .muted {
      color: #666;
    }

    .total {
      font-size: 24px;
      font-weight: bold;
      color: #0a7a28;
    }

    .btn {
      display: inline-block;
      width: 100%;
      text-align: center;
      background: #0b57d0;
      color: white;
      text-decoration: none;
      padding: 14px 18px;
      border-radius: 12px;
      font-weight: bold;
      box-sizing: border-box;
      border: none;
      cursor: pointer;
      font-size: 18px;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="card">
      <h1>Resumen de tu pedido</h1>
      <p class="muted">Aquí verás los productos seleccionados y el monto total antes de continuar.</p>
    </div>

    <div class="card">
      <h2>Productos</h2>
      <div id="productos"></div>
    </div>

    <div class="card">
      <h2>Total</h2>
      <div class="total" id="total">0 Bs</div>
    </div>

    <div class="card">
      <a class="btn" id="continuarBtn" href="#">Continuar con el pedido</a>
    </div>
  </div>

  <script>
    const params = new URLSearchParams(window.location.search);

    const producto = params.get('producto') || 'Producto no definido';
    const precio = Number(params.get('precio')) || 0;
    const cantidad = Number(params.get('cantidad')) || 1;

    const subtotal = precio * cantidad;

    document.getElementById('productos').innerHTML = `
      <div class="row">
        <div>
          <strong>${producto}</strong><br>
          <span class="muted">Cantidad: ${cantidad}</span>
        </div>
        <div>${subtotal} Bs</div>
      </div>
    `;

    document.getElementById('total').textContent = `${subtotal} Bs`;

    document.getElementById('continuarBtn').href = '#';
  </script>
</body>
</html>
