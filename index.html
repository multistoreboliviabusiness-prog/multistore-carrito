<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>MultiStore Carrito</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      margin: 0;
      background: url('fondo.png') no-repeat center center fixed;
      background-size: cover;
      color: #222;
    }

    .container {
      max-width: 680px;
      margin: 0 auto;
      padding: 24px;
    }

    .card {
      background: rgba(255, 255, 255, 0.92);
      border-radius: 16px;
      padding: 20px;
      box-shadow: 0 4px 18px rgba(0, 0, 0, 0.08);
      margin-bottom: 20px;
    }

    h1 {
      margin-top: 0;
      font-size: 32px;
    }

    h2 {
      margin-top: 0;
      font-size: 22px;
    }

    .row {
      display: flex;
      justify-content: space-between;
      gap: 12px;
      padding: 14px 0;
      border-bottom: 1px solid #eee;
    }

    .row:last-child {
      border-bottom: none;
    }

    .product-name {
      font-weight: bold;
      margin-bottom: 6px;
    }

    .muted {
      color: #666;
      line-height: 1.5;
    }

    .subtotal {
      font-weight: bold;
      white-space: nowrap;
      align-self: center;
      font-size: 18px;
    }

    .total {
      font-size: 24px;
      font-weight: bold;
      color: #0a7a28;
    }

    .btn {
      display: inline-block;
      width: 100%;
      text-align: center;
      background: #0b57d0;
      color: white;
      text-decoration: none;
      padding: 14px 18px;
      border-radius: 12px;
      font-weight: bold;
      box-sizing: border-box;
      border: none;
      cursor: pointer;
      font-size: 18px;
    }

    .btn-secondary {
      background: #444;
      margin-top: 12px;
    }

    .item-actions {
      margin-top: 12px;
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
    }

    .mini-btn {
      border: none;
      border-radius: 10px;
      padding: 8px 12px;
      font-size: 16px;
      cursor: pointer;
      font-weight: bold;
    }

    .mini-btn-minus,
    .mini-btn-plus {
      background: #ececec;
      color: #222;
      min-width: 42px;
    }

    .mini-btn-delete {
      background: #f3d7d7;
      color: #8b0000;
    }

    .cantidad-box {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-width: 44px;
      padding: 8px 10px;
      background: #f5f5f5;
      border-radius: 10px;
      font-weight: bold;
    }

    .detail-box {
      margin-top: 8px;
      padding: 10px 12px;
      background: rgba(0, 0, 0, 0.03);
      border-radius: 10px;
    }

    .detail-line {
      margin: 4px 0;
      color: #444;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="card">
      <h1>Resumen de tu pedido</h1>
      <p class="muted">Aquí verás los productos seleccionados y el monto total antes de continuar.</p>
    </div>

    <div class="card">
      <h2>Productos</h2>
      <div id="productos"></div>
    </div>

    <div class="card">
      <h2>Total</h2>
      <div class="total" id="total">0 Bs</div>
    </div>

    <div class="card">
      <a class="btn" id="continuarBtn" href="#">Continuar con mi compra</a>
      <a class="btn btn-secondary" href="https://www.multistorebolivia.com">Volver a la tienda</a>
      <button class="btn btn-secondary" id="vaciarBtn" type="button">Vaciar carrito</button>
    </div>
  </div>

  <script>
    const params = new URLSearchParams(window.location.search);
    const productoNuevo = params.get('producto');
    const precioNuevo = Number(params.get('precio')) || 0;
    const cantidadNueva = Number(params.get('cantidad')) || 1;

    const productosDiv = document.getElementById('productos');
    const totalDiv = document.getElementById('total');
    const vaciarBtn = document.getElementById('vaciarBtn');

    let carrito = JSON.parse(localStorage.getItem('multistore_carrito') || '[]');

    if (productoNuevo && precioNuevo > 0) {
      const existente = carrito.find(item => item.producto === productoNuevo);

      if (existente) {
        existente.cantidad += cantidadNueva;
      } else {
        carrito.push({
          producto: productoNuevo,
          precio: precioNuevo,
          cantidad: cantidadNueva
        });
      }

      localStorage.setItem('multistore_carrito', JSON.stringify(carrito));
      window.history.replaceState({}, document.title, window.location.pathname);
    }

    function guardarCarrito() {
      localStorage.setItem('multistore_carrito', JSON.stringify(carrito));
    }

    function renderCarrito() {
      let total = 0;
      let html = '';

      if (carrito.length > 0) {
        carrito.forEach((item, index) => {
          const subtotal = item.precio * item.cantidad;
          total += subtotal;

          html += `
            <div class="row">
              <div style="flex: 1;">
                <div class="product-name">${item.producto}</div>
                <div class="muted">Precio unitario: ${item.precio} Bs</div>
                <div class="muted">Cantidad: ${item.cantidad}</div>
                <div class="muted">Subtotal: ${subtotal} Bs</div>

                <div class="item-actions">
                  <button class="mini-btn mini-btn-minus" data-action="minus" data-index="${index}">−</button>
                  <div class="cantidad-box">${item.cantidad}</div>
                  <button class="mini-btn mini-btn-plus" data-action="plus" data-index="${index}">+</button>
                  <button class="mini-btn mini-btn-delete" data-action="delete" data-index="${index}">Eliminar</button>
                </div>
              </div>
              <div class="subtotal">${subtotal} Bs</div>
            </div>
          `;
        });
      } else {
        html = `<p class="muted">No hay productos en el carrito.</p>`;
      }

      productosDiv.innerHTML = html;
      totalDiv.textContent = `${total} Bs`;

      const itemsParam = carrito
        .map(item => `${encodeURIComponent(item.producto)},${item.precio},${item.cantidad}`)
        .join('|');

      const resumenPedido = carrito
        .map(item => `${item.producto} x${item.cantidad}`)
        .join(' | ');

      const incluyeHidrogel = carrito.some(
        item => item.producto === 'Protector Hidrogel'
      ) ? 'si' : 'no';

      const tallyBaseUrl = 'https://tally.so/r/eqxBpe';
      const redirectUrl = 'https://multistore-carrito.vercel.app/pago';

      const continuarUrl =
        `${tallyBaseUrl}` +
        `?items=${itemsParam}` +
        `&resumen_pedido=${encodeURIComponent(resumenPedido)}` +
        `&total_pedido=${encodeURIComponent(total)}` +
        `&redirect_url=${encodeURIComponent(redirectUrl)}` +
        `&incluye_hidrogel=${encodeURIComponent(incluyeHidrogel)}`;

      document.getElementById('continuarBtn').href = continuarUrl;
    }

    productosDiv.addEventListener('click', (e) => {
      const btn = e.target.closest('button[data-action]');
      if (!btn) return;

      const action = btn.dataset.action;
      const index = Number(btn.dataset.index);

      if (Number.isNaN(index) || !carrito[index]) return;

      if (action === 'plus') {
        carrito[index].cantidad += 1;
      }

      if (action === 'minus') {
        carrito[index].cantidad -= 1;
        if (carrito[index].cantidad <= 0) {
          carrito.splice(index, 1);
        }
      }

      if (action === 'delete') {
        carrito.splice(index, 1);
      }

      guardarCarrito();
      renderCarrito();
    });

    vaciarBtn.addEventListener('click', () => {
      localStorage.removeItem('multistore_carrito');
      carrito = [];
      renderCarrito();
    });

    renderCarrito();
  </script>
</body>
</html>
