<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Mini resumen carrito</title>
  <style>
    html, body {
      margin: 0;
      padding: 0;
      background: transparent;
      font-family: Arial, sans-serif;
      overflow: hidden;
    }

    .wrap {
      width: 100%;
      height: 100%;
      box-sizing: border-box;
      padding: 10px;
    }

    .card {
      background: rgba(255, 255, 255, 0.97);
      border-radius: 18px;
      box-shadow: 0 8px 24px rgba(0,0,0,0.18);
      overflow: hidden;
      border: 1px solid rgba(0,0,0,0.06);
    }

    .header {
      padding: 14px 16px;
      font-size: 18px;
      font-weight: bold;
      border-bottom: 1px solid #eee;
      background: #f8f9fb;
    }

    .body {
      max-height: 260px;
      overflow-y: auto;
      padding: 0 16px;
    }

    .item {
      padding: 12px 0;
      border-bottom: 1px solid #eee;
    }

    .item:last-child {
      border-bottom: none;
    }

    .name {
      font-size: 14px;
      font-weight: bold;
      color: #222;
      line-height: 1.35;
      margin-bottom: 4px;
    }

    .meta {
      font-size: 13px;
      color: #666;
      line-height: 1.4;
    }

    .footer {
      padding: 14px 16px 16px;
      border-top: 1px solid #eee;
      background: white;
    }

    .total {
      display: flex;
      justify-content: space-between;
      align-items: center;
      font-size: 17px;
      font-weight: bold;
      margin-bottom: 12px;
      color: #111;
    }

    .btn {
      display: inline-block;
      width: 100%;
      box-sizing: border-box;
      text-align: center;
      text-decoration: none;
      border: none;
      border-radius: 12px;
      padding: 12px 14px;
      font-weight: bold;
      font-size: 15px;
      cursor: pointer;
      background: #0b57d0;
      color: white;
    }

    .empty {
      padding: 18px 16px;
      color: #666;
      font-size: 14px;
      text-align: center;
    }

    .count {
      font-size: 13px;
      color: #666;
      font-weight: normal;
      margin-left: 6px;
    }

    @media (max-width: 768px) {
      .body {
        max-height: 220px;
      }
    }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="card">
      <div class="header">
        Tu carrito
        <span class="count" id="countText"></span>
      </div>

      <div class="body" id="body"></div>

      <div class="footer">
        <div class="total">
          <span>Total</span>
          <span id="total">0 Bs</span>
        </div>
        <a class="btn" href="https://multistore-carrito.vercel.app" target="_top">
          Ver carrito
        </a>
      </div>
    </div>
  </div>

  <script>
    function leerCarrito() {
      try {
        return JSON.parse(localStorage.getItem('multistore_carrito') || '[]');
      } catch {
        return [];
      }
    }

    function renderMiniResumen() {
      const carrito = leerCarrito();
      const body = document.getElementById('body');
      const totalEl = document.getElementById('total');
      const countText = document.getElementById('countText');

      let total = 0;
      let totalItems = 0;

      carrito.forEach(item => {
        const cantidad = Number(item.cantidad || 0);
        const precio = Number(item.precio || 0);
        total += cantidad * precio;
        totalItems += cantidad;
      });

      totalEl.textContent = `${total} Bs`;
      countText.textContent = totalItems > 0 ? `(${totalItems})` : '';

      if (carrito.length === 0) {
        body.innerHTML = `<div class="empty">Tu carrito está vacío.</div>`;
        return;
      }

      body.innerHTML = carrito.map(item => {
        const cantidad = Number(item.cantidad || 0);
        const precio = Number(item.precio || 0);
        const subtotal = cantidad * precio;

        return `
          <div class="item">
            <div class="name">${item.producto}</div>
            <div class="meta">Cantidad: ${cantidad}</div>
            <div class="meta">Subtotal: ${subtotal} Bs</div>
          </div>
        `;
      }).join('');
    }

    renderMiniResumen();
    window.addEventListener('storage', renderMiniResumen);
    setInterval(renderMiniResumen, 1500);
  </script>
</body>
</html>
