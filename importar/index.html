<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Importando carrito</title>
  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: url('../fondo.png') no-repeat center center fixed;
      background-size: cover;
      color: #222;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
    }

    .box {
      background: rgba(255,255,255,0.94);
      padding: 28px;
      border-radius: 18px;
      max-width: 520px;
      text-align: center;
      box-shadow: 0 6px 24px rgba(0,0,0,0.10);
    }

    h1 {
      margin-top: 0;
      font-size: 30px;
    }

    p {
      font-size: 18px;
      color: #555;
      line-height: 1.5;
      margin-bottom: 0;
    }
  </style>
</head>
<body>
  <div class="box">
    <h1>Cargando tu carrito...</h1>
    <p>Estamos preparando tu resumen de compra.</p>
  </div>

  <script>
    const params = new URLSearchParams(window.location.search);
    const itemsParam = params.get('items') || '';

    let carrito = [];

    if (itemsParam.trim() !== '') {
      carrito = itemsParam.split('|').map(item => {
        const partes = item.split(',');
        return {
          producto: decodeURIComponent(partes[0] || ''),
          precio: Number(partes[1]) || 0,
          cantidad: Number(partes[2]) || 1
        };
      }).filter(item => item.producto && item.precio > 0);
    }

    localStorage.setItem('multistore_carrito', JSON.stringify(carrito));
    window.location.href = 'https://multistore-carrito.vercel.app';
  </script>
</body>
</html>
