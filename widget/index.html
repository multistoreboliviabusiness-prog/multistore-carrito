<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Mini carrito MultiStore</title>
  <style>
    html, body {
      margin: 0;
      padding: 0;
      background: transparent;
      overflow: hidden;
      font-family: Arial, sans-serif;
    }

    .wrap {
      width: 100%;
      height: 100%;
      position: relative;
    }

    .fab {
      position: fixed;
      right: 12px;
      bottom: 12px;
      width: 62px;
      height: 62px;
      border-radius: 999px;
      background: #0b57d0;
      color: white;
      border: none;
      box-shadow: 0 8px 22px rgba(0, 0, 0, 0.24);
      cursor: pointer;
      font-size: 28px;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .badge {
      position: absolute;
      top: -3px;
      right: -3px;
      min-width: 24px;
      height: 24px;
      padding: 0 6px;
      border-radius: 999px;
      background: #e53935;
      color: white;
      font-size: 13px;
      font-weight: bold;
      border: 2px solid white;
      display: flex;
      align-items: center;
      justify-content: center;
      box-sizing: border-box;
    }

    .badge.hidden {
      display: none;
    }

    .panel {
      position: fixed;
      right: 12px;
      bottom: 84px;
      width: 320px;
      max-width: calc(100vw - 24px);
      background: rgba(255, 255, 255, 0.98);
      border-radius: 18px;
      box-shadow: 0 10px 28px rgba(0, 0, 0, 0.24);
      overflow: hidden;
      display: none;
      border: 1px solid rgba(0,0,0,0.06);
    }

    .panel.open {
      display: block;
    }

    .panel-header {
      padding: 14px 16px;
      font-weight: bold;
      font-size: 18px;
      border-bottom: 1px solid #eee;
      background: #f8f9fb;
    }

    .panel-body {
      max-height: 280px;
      overflow-y: auto;
      padding: 0 16px;
    }

    .item {
      padding: 12px 0;
      border-bottom: 1px solid #eee;
    }

    .item:last-child {
      border-bottom: none;
    }

    .item-name {
      font-size: 14px;
      font-weight: bold;
      color: #222;
      margin-bottom: 4px;
      line-height: 1.35;
    }

    .item-meta {
      font-size: 13px;
      color: #666;
      line-height: 1.4;
    }

    .panel-footer {
      border-top: 1px solid #eee;
      padding: 14px 16px 16px;
      background: white;
    }

    .total {
      display: flex;
      justify-content: space-between;
      align-items: center;
      font-size: 17px;
      font-weight: bold;
      margin-bottom: 12px;
      color: #111;
    }

    .btn {
      display: inline-block;
      width: 100%;
      box-sizing: border-box;
      text-align: center;
      text-decoration: none;
      border: none;
      border-radius: 12px;
      padding: 12px 14px;
      font-weight: bold;
      font-size: 15px;
      cursor: pointer;
    }

    .btn-primary {
      background: #0b57d0;
      color: white;
    }

    .empty {
      padding: 18px 0;
      color: #666;
      font-size: 14px;
      text-align: center;
    }

    @media (max-width: 768px) {
      .panel {
        width: 300px;
        right: 10px;
        bottom: 78px;
      }

      .fab {
        width: 58px;
        height: 58px;
        font-size: 26px;
        right: 10px;
        bottom: 10px;
      }
    }
  </style>
</head>
<body>
  <div class="wrap">
    <button class="fab" id="toggleCart" aria-label="Abrir mini carrito">
      <span>🛒</span>
      <span class="badge hidden" id="badge">0</span>
    </button>

    <div class="panel" id="panel">
      <div class="panel-header">Tu carrito</div>
      <div class="panel-body" id="panelBody"></div>
      <div class="panel-footer">
        <div class="total">
          <span>Total</span>
          <span id="total">0 Bs</span>
        </div>
        <a class="btn btn-primary" href="https://multistore-carrito.vercel.app" target="_top">
          Ver carrito
        </a>
      </div>
    </div>
  </div>

  <script>
    const panel = document.getElementById('panel');
    const badge = document.getElementById('badge');
    const panelBody = document.getElementById('panelBody');
    const totalEl = document.getElementById('total');
    const toggleCart = document.getElementById('toggleCart');

    function leerCarrito() {
      try {
        return JSON.parse(localStorage.getItem('multistore_carrito') || '[]');
      } catch {
        return [];
      }
    }

    function renderMiniCart() {
      const carrito = leerCarrito();
      let totalItems = 0;
      let total = 0;

      carrito.forEach(item => {
        const cantidad = Number(item.cantidad || 0);
        const precio = Number(item.precio || 0);
        totalItems += cantidad;
        total += cantidad * precio;
      });

      if (totalItems > 0) {
        badge.textContent = totalItems > 99 ? '99+' : String(totalItems);
        badge.classList.remove('hidden');
      } else {
        badge.classList.add('hidden');
      }

      totalEl.textContent = `${total} Bs`;

      if (carrito.length === 0) {
        panelBody.innerHTML = `<div class="empty">Tu carrito está vacío.</div>`;
        return;
      }

      panelBody.innerHTML = carrito.map(item => {
        const cantidad = Number(item.cantidad || 0);
        const precio = Number(item.precio || 0);
        const subtotal = cantidad * precio;

        return `
          <div class="item">
            <div class="item-name">${item.producto}</div>
            <div class="item-meta">Cantidad: ${cantidad}</div>
            <div class="item-meta">Subtotal: ${subtotal} Bs</div>
          </div>
        `;
      }).join('');
    }

    toggleCart.addEventListener('click', () => {
      panel.classList.toggle('open');
      renderMiniCart();
    });

    document.addEventListener('click', (e) => {
      const insidePanel = panel.contains(e.target);
      const insideButton = toggleCart.contains(e.target);
      if (!insidePanel && !insideButton) {
        panel.classList.remove('open');
      }
    });

    window.addEventListener('storage', renderMiniCart);
    setInterval(renderMiniCart, 1500);

    renderMiniCart();
  </script>
</body>
</html>
